name: Sync Kanka Data

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install Pillow

      - name: Fetch Kanka data
        env:
          KANKA_TOKEN: ${{ secrets.KANKA_TOKEN }}
          KANKA_CAMPAIGN_ID: ${{ secrets.KANKA_CAMPAIGN_ID }}
        run: node Tech/fetch-kanka.mjs

      - name: Build site data
        env:
          BREWERY_ORG_NAME: ${{ secrets.BREWERY_ORG_NAME }}
        run: node Tech/build-site-data.mjs && python Tech/generate-map-previews.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data docs/assets/maps/previews
          if git diff --cached --quiet; then
            echo "Nothing changed, skipping commit."
          else
            git commit -m "Sync latest Kanka data"
            git push
          fi
